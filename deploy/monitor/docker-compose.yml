version: '3.8'

services:
  wireflow:
    image: ghcr.io/wireflowio/wireflow:pr-191
    container_name: wireflow
    # 移除 /etc/hosts 挂载，改用下面的 extra_hosts 逻辑更稳妥
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "signaling.wireflow.run:101.36.119.12"
    command:
      - "up"
      - "--token=fIJr6BpT2captanz"
      - "--enable-metric"
      - "--save"
    restart: always

  vmagent:
    image: docker.1ms.run/victoriametrics/vmagent
    container_name: vmagent
    ports:
      - "8429:8429"
    volumes:
      - vdata:/vmagentdata
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "-remoteWrite.url=http://101.36.119.12:8428/api/v1/write"
      # 使用变量名，或者让后端自动识别，减少硬编码
      - "-remoteWrite.label=agent=vmagent-universal"
      - "-remoteWrite.tmpDataPath=/vmagentdata"
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-httpListenAddr=:8429"
    restart: always

volumes:
  vdata: