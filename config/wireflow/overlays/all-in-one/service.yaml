# API 服务：供 UI / wfctl 访问
apiVersion: v1
kind: Service
metadata:
  name: api-service
  labels:
    app.kubernetes.io/name: wireflowd
spec:
  selector:
    app.kubernetes.io/name: wireflowd
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: LoadBalancer
---
# NATS 服务：供边缘 Agent 连接内嵌 NATS
apiVersion: v1
kind: Service
metadata:
  name: nats
  labels:
    app.kubernetes.io/name: wireflowd
spec:
  selector:
    app.kubernetes.io/name: wireflowd
  ports:
    - name: client
      port: 4222
      targetPort: 4222
  type: ClusterIP
