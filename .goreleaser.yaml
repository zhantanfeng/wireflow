version: 1
project_name: wireflow

builds:
  # Edge Agent (bare metal / non-k8s nodes)
  - id: "wireflow"
    binary: "wireflow"
    main: "./cmd/wireflow/main.go"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X wireflow/pkg/version.Version={{.Version}}
      - -X wireflow/pkg/version.GitCommit={{.Commit}}
      - -X wireflow/pkg/version.BuildTime={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  # All-in-One 控制面（嵌入 NATS + SQLite，仅 linux）
  - id: "wireflowd"
    binary: "wireflowd"
    main: "./cmd/wireflowd/main.go"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X wireflow/pkg/version.Version={{.Version}}
      - -X wireflow/pkg/version.GitCommit={{.Commit}}
      - -X wireflow/pkg/version.BuildTime={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  # wireflow agent 打包（面向边缘/终端用户）
  - id: "wireflow-archive"
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - wireflow
    format_overrides:
      - goos: windows
        format: zip

  # wireflowd 单独打包（面向服务端部署）
  - id: "wireflowd-archive"
    name_template: "wireflowd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - wireflowd

checksum:
  name_template: "checksums.txt"

# Docker 镜像由 release.yml 中独立的 docker-image job 构建和推送，
# goreleaser 只负责 binary/archive/changelog。
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
