name: CI/CD Pipeline

on:
  pull_request_target:
    types: [labeled, synchronize]

jobs:
  # 1. 在 GitHub 免费资源上构建并推送
  build-and-push:
    if: |
      contains(github.event.pull_request.labels.*.name, 'ok-to-test') ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'OWNER'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.32.1

      # 只构建并推送 wireflowd（all-in-one）和 wireflow（边缘 agent）
      - name: Build and Push Images
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="pr-${{ github.event.pull_request.number }}"
          REGISTRY="ghcr.io/${OWNER_LOWER}"

          make docker-build SERVICE=wireflowd TAG="$TAG" REGISTRY="$REGISTRY"
          make docker-build SERVICE=wireflow  TAG="$TAG" REGISTRY="$REGISTRY"
          make docker-push  SERVICE=wireflowd TAG="$TAG" REGISTRY="$REGISTRY"
          make docker-push  SERVICE=wireflow  TAG="$TAG" REGISTRY="$REGISTRY"

  # 2. 在 Self-hosted 服务器上部署 all-in-one
  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Deploy to K3s/K8s
        run: |
          export PATH=$PATH:/usr/local/go/bin:$(go env GOPATH)/bin

          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="pr-${{ github.event.pull_request.number }}"

          echo "🚀 Deploying pr-${{ github.event.pull_request.number }}"
          make undeploy-aio
          make deploy-aio IMG="ghcr.io/${OWNER_LOWER}/wireflowd:${TAG}"

#      - name: Run E2E Tests
#        if: contains(github.event.pull_request.labels.*.name, 'run-e2e')
#        run: |
#          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
#          TAG="pr-${{ github.event.pull_request.number }}"
#          make test-e2e LOCAL_AGENT_IMAGE="ghcr.io/${OWNER_LOWER}/wireflow:${TAG}"
