name: Wireflow E2E Test

on:
  push:
    branches:
      - dev
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    branches:
      - master
      - main

env:
  REGISTRY: ghcr.io
  CLUSTER_NAME: wf-e2e
  E2E_KUBECONFIG: /tmp/wf-e2e.kubeconfig

permissions:
  contents: read
  packages: write

jobs:
  e2e-test:
    # push 到 dev 分支时直接触发；PR 需要手动打 run-e2e 标签
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e'))

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.32.1

      - name: Prepare metadata
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=e2e" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建 wireflowd（all-in-one 控制面）和 wireflow（边缘 agent，供 E2E 测试部署）
      - name: Build Docker images
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}"
          TAG="${{ steps.meta.outputs.tag }}"

          make docker-build SERVICE=wireflowd TAG="$TAG" REGISTRY="$REGISTRY"
          make docker-build SERVICE=wireflow  TAG="$TAG" REGISTRY="$REGISTRY"

          # 只有非 PR 事件（如 push 到 dev）才推送
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "🚀 Not a PR, pushing images to GHCR..."
            make docker-push SERVICE=wireflowd TAG="$TAG" REGISTRY="$REGISTRY"
            make docker-push SERVICE=wireflow  TAG="$TAG" REGISTRY="$REGISTRY"
          else
            echo "跳过推送：当前为 PR 流程，镜像将直接导入 k3d 集群。"
          fi

      # 单 server 节点（--agents 0），避免 port-forward 跨节点 EOF 问题
      - name: Setup k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          args: >-
            --agents 0
            --no-lb
            --k3s-arg "--disable=traefik@server:*"

      - name: Export kubeconfig
        run: |
          k3d kubeconfig get ${{ env.CLUSTER_NAME }} > ${{ env.E2E_KUBECONFIG }}
          echo "KUBECONFIG=${{ env.E2E_KUBECONFIG }}" >> $GITHUB_ENV

      - name: Import images into k3d
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}"
          TAG="${{ steps.meta.outputs.tag }}"
          k3d image import "${REGISTRY}/wireflowd:${TAG}" -c ${{ env.CLUSTER_NAME }}
          k3d image import "${REGISTRY}/wireflow:${TAG}"  -c ${{ env.CLUSTER_NAME }}

      - name: Install kustomize
        run: make kustomize

      # 部署 all-in-one（内嵌 NATS + SQLite，无外部依赖）
      # deploy-aio 内部含 rollout status 等待（180s），readiness probe 就绪后才返回
      - name: Deploy Wireflow All-in-One
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          REGISTRY="${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}"
          TAG="${{ steps.meta.outputs.tag }}"
          make deploy-aio \
            IMG="${REGISTRY}/wireflowd:${TAG}" \
            KUBECTL="kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }}"

      - name: Run E2E tests
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}"
          TAG="${{ steps.meta.outputs.tag }}"
          make test-e2e \
            LOCAL_AGENT_IMAGE="${REGISTRY}/wireflow:${TAG}" \
            E2E_KUBECONFIG="${{ env.E2E_KUBECONFIG }}"

      - name: Collect failure logs
        if: failure()
        run: |
          KC="kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }}"

          echo ""
          echo "===== wireflow-system: 控制面 Pod 状态 ====="
          $KC get all -n wireflow-system -o wide || true

          echo ""
          echo "===== wireflowd (all-in-one) 日志 (最近 300 行) ====="
          $KC logs -n wireflow-system -l app.kubernetes.io/name=wireflowd --tail=300 || true

          echo ""
          echo "===== E2E 测试 Namespace 列表 ====="
          NAMESPACES=$($KC get ns -o name | grep "^namespace/wf-" | cut -d/ -f2 || true)
          echo "$NAMESPACES"

          for ns in $NAMESPACES; do
            echo ""
            echo "####################################################"
            echo "# Namespace: $ns"
            echo "####################################################"

            echo ""
            echo "--- WireflowNetwork ---"
            $KC get wfnetwork -n "$ns" -o wide || true
            $KC describe wfnetwork -n "$ns" || true

            echo ""
            echo "--- WireflowPeer ---"
            $KC get wfpeer -n "$ns" -o wide || true
            $KC describe wfpeer -n "$ns" || true

            echo ""
            echo "--- ConfigMap (agent 配置) ---"
            $KC get configmap -n "$ns" -l app.kubernetes.io/managed-by=wireflow-controller || true
            for cm in $($KC get configmap -n "$ns" -l app.kubernetes.io/managed-by=wireflow-controller -o jsonpath='{.items[*].metadata.name}' || true); do
              echo "  [ConfigMap: $cm]"
              $KC get configmap -n "$ns" "$cm" -o jsonpath='{.data.config\.json}' | python3 -m json.tool 2>/dev/null || \
              $KC get configmap -n "$ns" "$cm" -o jsonpath='{.data.config\.json}' || true
              echo ""
            done

            echo ""
            echo "--- Pod 状态 ---"
            $KC get pods -n "$ns" -o wide || true

            PODS=$($KC get pods -n "$ns" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
            for pod in $PODS; do
              POD_PHASE=$($KC get pod -n "$ns" "$pod" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              echo ""
              echo "  === Pod: $pod (phase=$POD_PHASE) ==="

              if [ "$POD_PHASE" = "Running" ]; then
                echo "  [wireflow status] WireGuard 隧道状态"
                $KC exec -n "$ns" "$pod" -- /app/wireflow status 2>&1 || echo "  wireflow status 失败"

                echo ""
                echo "  [ip addr] 网络接口"
                $KC exec -n "$ns" "$pod" -- ip addr show 2>&1 || true

                echo ""
                echo "  [ip route] 路由表"
                $KC exec -n "$ns" "$pod" -- ip route show 2>&1 || true
              fi

              echo ""
              echo "  [agent 日志 - 最近 150 行]"
              $KC logs -n "$ns" "$pod" --all-containers --tail=150 2>&1 || true
            done
          done

          echo ""
          echo "===== WireflowPeer 汇总 (所有 ns) ====="
          $KC get wfpeer --all-namespaces -o wide || true

      - name: Cleanup test namespaces on failure
        if: failure()
        run: |
          kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }} \
            get ns -o name | grep "^namespace/wf-" \
            | xargs -r kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }} \
            delete --ignore-not-found=true --timeout=60s || true
