name: Test README Scripts

# Validates every CLI command documented in README.md, step by step,
# simulating exactly what a real user would run on a fresh machine.
#
# Uses published wireflowio images — no build or image import required.
# Setup:  bash hack/quickstart.sh  (installs k3d, creates cluster, deploys
#         wireflowd, kubectl port-forward 8080/4222, waits for ready)
# Test:   README Steps 1-6

on:
  push:
    branches: [dev]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  SIGNALING_URL: nats://localhost:4222
  SERVER_URL: http://localhost:8080
  AGENT_IMAGE: ghcr.io/wireflowio/wireflow:latest

permissions:
  contents: read

jobs:
  test-readme-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Run quickstart.sh ──────────────────────────────────────────────────
      # Installs k3d, creates cluster, applies CRDs, deploys
      # ghcr.io/wireflowio/wireflowd:latest, waits for pod Ready.

      - name: "Run hack/quickstart.sh (README Quick Start)"
        run: bash hack/quickstart.sh

      # quickstart.sh fetches wireflow-all-in-one.yaml from GitHub master, so
      # the NATS service is deployed as ClusterIP.  Patch it to LoadBalancer so
      # k3d's servicelb binds hostPort 4222 on the node and the k3d loadbalancer
      # (mapped via --port "4222:4222@loadbalancer") can route to it.
      - name: "Patch NATS service to LoadBalancer"
        run: |
          kubectl patch svc wireflow-nats-service -n wireflow-system \
            -p '{"spec":{"type":"LoadBalancer"}}'
          echo "✅ wireflow-nats-service patched to LoadBalancer"

      # ── Expose services to localhost ──────────────────────────────────────
      # API (8080): port-forward (ClusterIP, short-lived CLI calls only).
      # NATS (4222): LoadBalancer + k3d --port mapping — direct, no port-forward.

      - name: "Port-forward API to localhost; wait for NATS LoadBalancer"
        run: |
          # Verify endpoints are populated before port-forwarding
          echo "Checking service endpoints..."
          for i in $(seq 1 20); do
            EP=$(kubectl get endpoints wireflow-api-service -n wireflow-system \
              -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)
            if [[ -n "$EP" ]]; then
              echo "✅ wireflow-api-service endpoint ready: $EP"
              break
            fi
            echo "  Waiting for endpoints... ($i/20)"
            sleep 3
          done
          kubectl get endpoints -n wireflow-system

          # API: port-forward (CLI short-lived calls, instability is tolerable)
          # Bind to 0.0.0.0 so docker containers can reach via host gateway.
          (while true; do
            kubectl port-forward --address 0.0.0.0 -n wireflow-system \
              svc/wireflow-api-service 8080:8080 >>/tmp/pf-api.log 2>&1 || true
            echo "[pf-api] restarting..." >>/tmp/pf-api.log
            sleep 1
          done) &

          sleep 3

          echo "Checking API port..."
          for i in $(seq 1 20); do
            nc -z 127.0.0.1 8080 2>/dev/null && break || true
            sleep 1
          done
          nc -z 127.0.0.1 8080 2>/dev/null \
            && echo "✅ localhost:8080 ready" \
            || {
              echo "❌ localhost:8080 not reachable"
              echo "--- port-forward API log ---"; cat /tmp/pf-api.log || true
              echo "--- pods ---"; kubectl get pods -n wireflow-system -o wide || true
              exit 1
            }

          # NATS: wireflow-nats-service is type LoadBalancer; k3d maps it to
          # host port 4222 directly (no port-forward needed).
          # Wait for k3d's servicelb to assign the external IP.
          echo "Waiting for NATS LoadBalancer (k3d port mapping)..."
          for i in $(seq 1 30); do
            nc -z 127.0.0.1 4222 2>/dev/null && break || true
            echo "  Waiting for NATS on :4222... ($i/30)"
            sleep 2
          done
          nc -z 127.0.0.1 4222 2>/dev/null \
            && echo "✅ localhost:4222 ready (LoadBalancer direct)" \
            || {
              echo "❌ localhost:4222 not reachable"
              kubectl get svc wireflow-nats-service -n wireflow-system || true
              kubectl get pods -n wireflow-system -o wide || true
              exit 1
            }

      # ── Use published image as CLI ─────────────────────────────────────────
      # ENTRYPOINT is /app/wireflow, so `docker run image <subcommand>` works
      # directly as a CLI. --network host lets it reach localhost:8080 / 4222.

      - name: "Set WIREFLOW to published image"
        run: |
          docker pull "${AGENT_IMAGE}"
          docker run --rm --network host "${AGENT_IMAGE}" --help | head -5
          echo "WIREFLOW=docker run --rm --network host ${AGENT_IMAGE}" >> $GITHUB_ENV
          echo "✅ wireflow CLI via image: ${AGENT_IMAGE}"

      # ════════════════════════════════════════════════════════════════════════
      # Step 1: Create a workspace
      # ════════════════════════════════════════════════════════════════════════

      - name: "[Step 1a] wireflow workspace add"
        run: |
          echo ">>> wireflow workspace add dev --display-name Development --signaling-url $SIGNALING_URL"
          WS_OUTPUT=$($WIREFLOW workspace add dev \
            --display-name "Development" \
            --signaling-url "$SIGNALING_URL")
          echo "$WS_OUTPUT"

          NAMESPACE=$(echo "$WS_OUTPUT" | awk '/namespace:/ {print $2}')
          [[ -n "$NAMESPACE" ]] || { echo "❌ Failed to extract namespace"; exit 1; }
          echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
          echo "✅ Workspace created — namespace=$NAMESPACE"

      - name: "[Step 1b] wireflow workspace list"
        run: |
          echo ">>> wireflow workspace list --signaling-url $SIGNALING_URL"
          LIST=$($WIREFLOW workspace list --signaling-url "$SIGNALING_URL")
          echo "$LIST"
          echo "$LIST" | grep -q "$NAMESPACE" \
            && echo "✅ Namespace '$NAMESPACE' visible in list" \
            || { echo "❌ Workspace not found in list"; exit 1; }

      # ════════════════════════════════════════════════════════════════════════
      # Step 2: Create an enrollment token
      # ════════════════════════════════════════════════════════════════════════

      - name: "[Step 2a] wireflow token create"
        run: |
          echo ">>> wireflow token create dev-team -n $NAMESPACE --limit 10 --expiry 168h --signaling-url $SIGNALING_URL"
          $WIREFLOW token create dev-team \
            -n "$NAMESPACE" \
            --limit 10 \
            --expiry 168h \
            --signaling-url "$SIGNALING_URL"
          echo "✅ Token created"

      - name: "[Step 2b] wireflow token list — extract token value"
        run: |
          echo ">>> wireflow token list -n $NAMESPACE --signaling-url $SIGNALING_URL"
          TOKEN_LIST=$($WIREFLOW token list -n "$NAMESPACE" --signaling-url "$SIGNALING_URL")
          echo "$TOKEN_LIST"

          TOKEN=$(echo "$TOKEN_LIST" | awk '/^TOKEN/{found=1; next} found && NF>0 {print $1; exit}')
          [[ -n "$TOKEN" ]] || { echo "❌ Failed to extract token"; exit 1; }
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "✅ Token extracted: ${TOKEN:0:8}..."

      # ════════════════════════════════════════════════════════════════════════
      # Step 3: Start agents
      # docker run -d --name wf-agent --restart unless-stopped \
      #   --privileged --network host \
      #   ghcr.io/wireflowio/wireflow:latest \
      #   up --signaling-url nats://localhost:4222 --token <token>
      # ════════════════════════════════════════════════════════════════════════

      - name: "Wait for operator to create workspace namespace"
        run: |
          for i in $(seq 1 30); do
            kubectl get ns "$NAMESPACE" &>/dev/null && break || true
            echo "  Waiting for namespace $NAMESPACE... ($i/30)"
            sleep 2
          done
          kubectl get ns "$NAMESPACE" \
            && echo "✅ Namespace $NAMESPACE ready" \
            || { echo "❌ Namespace not created"; kubectl get ns; exit 1; }

      - name: "[Step 3] Start Agent A and Agent B"
        run: |
          # Each agent gets its own network namespace → no wf0 interface conflict.
          # A dedicated bridge lets the two containers reach each other for WireGuard
          # UDP traffic. host.docker.internal resolves to the Docker host gateway so
          # containers can reach the kubectl port-forwards on the host.
          docker network create wf-test-net

          AGENT_NATS="nats://host.docker.internal:4222"
          AGENT_API="http://host.docker.internal:8080"

          echo ">>> docker run -d --name wf-agent-a --privileged --network wf-test-net $AGENT_IMAGE up ..."
          docker run -d \
            --name wf-agent-a \
            --restart unless-stopped \
            --privileged \
            --network wf-test-net \
            --add-host=host.docker.internal:host-gateway \
            -e WIREFLOW_APP_ID=ci-wf-agent-a \
            "$AGENT_IMAGE" \
            up \
            --signaling-url "$AGENT_NATS" \
            --server-url "$AGENT_API" \
            --token "$TOKEN"

          echo ">>> docker run -d --name wf-agent-b --privileged --network wf-test-net $AGENT_IMAGE up ..."
          docker run -d \
            --name wf-agent-b \
            --restart unless-stopped \
            --privileged \
            --network wf-test-net \
            --add-host=host.docker.internal:host-gateway \
            -e WIREFLOW_APP_ID=ci-wf-agent-b \
            "$AGENT_IMAGE" \
            up \
            --signaling-url "$AGENT_NATS" \
            --server-url "$AGENT_API" \
            --token "$TOKEN"

          echo "✅ Both agent containers started on wf-test-net"

      - name: "Wait for both agents to register"
        run: |
          for i in $(seq 1 36); do
            NODE_COUNT=$($WIREFLOW workspace list --signaling-url "$SIGNALING_URL" 2>/dev/null \
              | awk '/dev/ {print $4}' || echo 0)
            echo "  Nodes: ${NODE_COUNT:-0}  (attempt $i/36)"
            [[ "${NODE_COUNT:-0}" -ge 2 ]] && break || true
            sleep 5
          done

          FINAL=$($WIREFLOW workspace list --signaling-url "$SIGNALING_URL")
          echo "$FINAL"
          NODE_COUNT=$(echo "$FINAL" | awk '/dev/ {print $4}')
          [[ "${NODE_COUNT:-0}" -ge 2 ]] \
            && echo "✅ Both agents registered (nodes=$NODE_COUNT)" \
            || { echo "❌ Expected ≥2 nodes, got ${NODE_COUNT:-0}"; docker logs wf-agent-a; exit 1; }

      # ════════════════════════════════════════════════════════════════════════
      # Step 4: Allow traffic between peers
      # ════════════════════════════════════════════════════════════════════════

      # Wait for both WireflowPeers to have an AllocatedAddress before creating
      # policy — mirrors e2e step 6. Policy matching requires peers to be fully
      # provisioned with a WG IP so the tunnel can be established immediately.
      - name: "Wait for WireflowPeer IP allocation"
        run: |
          echo "Waiting for both WireflowPeers to have AllocatedAddress (max 90s)..."
          for i in $(seq 1 30); do
            COUNT=$(kubectl get wfpeer -n "$NAMESPACE" \
              -o jsonpath='{.items[*].status.allocatedAddress}' 2>/dev/null \
              | tr ' ' '\n' | grep -v '^$' | wc -l || echo 0)
            echo "  Peers with IP: ${COUNT} (attempt $i/30)"
            [[ "${COUNT}" -ge 2 ]] && break || true
            sleep 3
          done
          kubectl get wfpeer -n "$NAMESPACE" -o wide 2>/dev/null || true
          COUNT=$(kubectl get wfpeer -n "$NAMESPACE" \
            -o jsonpath='{.items[*].status.allocatedAddress}' 2>/dev/null \
            | tr ' ' '\n' | grep -v '^$' | wc -l || echo 0)
          [[ "${COUNT}" -ge 2 ]] \
            && echo "✅ Both peers have WireGuard IPs" \
            || { echo "❌ WireflowPeer IP allocation timed out"; kubectl get wfpeer -n "$NAMESPACE" -o yaml || true; exit 1; }

      - name: "[Step 4a] wireflow policy allow-all"
        run: |
          echo ">>> wireflow policy allow-all -n $NAMESPACE --signaling-url $SIGNALING_URL"
          $WIREFLOW policy allow-all -n "$NAMESPACE" --signaling-url "$SIGNALING_URL"
          echo "✅ allow-all policy applied (uses wireflow.run/network-{name}=true label selector)"

      - name: "[Step 4c] wireflow policy add"
        run: |
          echo ">>> wireflow policy add my-policy -n $NAMESPACE --action ALLOW --signaling-url $SIGNALING_URL"
          $WIREFLOW policy add my-policy \
            -n "$NAMESPACE" \
            --action ALLOW \
            --desc "allow all peer traffic" \
            --signaling-url "$SIGNALING_URL"
          echo "✅ my-policy added"

      - name: "[Step 4d] wireflow policy list"
        run: |
          echo ">>> wireflow policy list -n $NAMESPACE --signaling-url $SIGNALING_URL"
          POLICIES=$($WIREFLOW policy list -n "$NAMESPACE" --signaling-url "$SIGNALING_URL")
          echo "$POLICIES"
          echo "$POLICIES" | grep -q "allow-all" \
            && echo "✅ allow-all present" || { echo "❌ allow-all missing"; exit 1; }
          echo "$POLICIES" | grep -q "my-policy" \
            && echo "✅ my-policy present" || { echo "❌ my-policy missing"; exit 1; }

      # ════════════════════════════════════════════════════════════════════════
      # Step 5: Verify connectivity
      # ════════════════════════════════════════════════════════════════════════

      - name: "[Step 5a] wireflow status"
        run: |
          echo "Waiting 20s for WireGuard peer config to be pushed and handshake to complete..."
          sleep 20

          echo "===== wireflowd logs (last 200 lines) ====="
          kubectl logs -n wireflow-system -l app.kubernetes.io/name=wireflowd --tail=200 2>&1 || true

          echo "===== WireflowPeer CRD status ====="
          kubectl get wfpeer -n "$NAMESPACE" -o wide 2>&1 || true

          echo "===== WireflowPolicy CRD ====="
          kubectl get wfpolicy -n "$NAMESPACE" -o yaml 2>&1 || true

          echo "--- agent-a container state ---"
          docker inspect wf-agent-a --format '{{.State.Status}} exitCode={{.State.ExitCode}} restarting={{.State.Restarting}}'

          echo "--- agent-b container state ---"
          docker inspect wf-agent-b --format '{{.State.Status}} exitCode={{.State.ExitCode}} restarting={{.State.Restarting}}'

          echo "--- agent-a logs (last 50 lines) ---"
          docker logs wf-agent-a --tail=50 2>&1

          echo "--- agent-b logs (last 50 lines) ---"
          docker logs wf-agent-b --tail=50 2>&1

          echo "--- WireGuard interfaces inside agent-a ---"
          docker exec wf-agent-a ip link show type wireguard 2>&1 || true

          echo "--- ip addr inside agent-a ---"
          docker exec wf-agent-a ip addr 2>&1 || true

          echo "--- WireGuard peers (wg show) inside agent-a ---"
          docker exec wf-agent-a wg show 2>&1 || true

          echo ">>> docker exec wf-agent-a /app/wireflow status"
          STATUS=$(docker exec wf-agent-a /app/wireflow status 2>&1)
          echo "$STATUS"
          
          echo "$STATUS" | grep -q "Interface" \
            && echo "✅ Interface present" \
            || { echo "❌ No interface info in status output"; exit 1; }
          
          echo "--- ip addr inside agent-b ---"
          docker exec wf-agent-b ip addr 2>&1 || true

          echo "--- WireGuard peers (wg show) inside agent-b ---"
          docker exec wf-agent-b wg show 2>&1 || true

          echo ">>> docker exec wf-agent-b /app/wireflow status"
          STATUS=$(docker exec wf-agent-b /app/wireflow status 2>&1)
          echo "$STATUS"

          echo "$STATUS" | grep -q "Interface" \
            && echo "✅ Interface present" \
            || { echo "❌ No interface info in status output"; exit 1; }

      - name: "[Step 5b] Ping Agent A → Agent B via WireGuard"
        run: |
          # Get Agent B's WireGuard address from the wf0 interface inside the container.
          # wireflow status prints: Address  10.x.x.x/24  (field 2 of Address line)
          STATUS_B=$(docker exec wf-agent-b /app/wireflow status 2>&1 || true)
          echo "--- agent-b status ---"
          echo "$STATUS_B"

          # Output format: "Address   : 10.0.0.4/32, fe80::..."
          # $1=Address $2=: $3=10.0.0.4/32, — strip comma then CIDR prefix
          WG_IP_B=$(echo "$STATUS_B" | awk '/^Address/{print $3}' | head -1 | cut -d',' -f1 | cut -d'/' -f1)

          if [[ -z "$WG_IP_B" ]]; then
            # Fallback: read wf0 addr directly from inside the container
            WG_IP_B=$(docker exec wf-agent-b \
              ip -4 addr show wf0 2>/dev/null \
              | awk '/inet /{print $2}' | cut -d'/' -f1 || true)
          fi

          echo "Agent B WireGuard IP: ${WG_IP_B:-(unknown)}"

          if [[ -n "$WG_IP_B" ]]; then
            # Retry ping for up to 15s
            echo ">>> ping $WG_IP_B from agent-a (retry up to 3 times)..."
            SUCCESS=0
            for i in $(seq 1 3); do
              echo "  attempt $i/3..."
              if docker exec wf-agent-a ping -c 3 -W 2 "$WG_IP_B" 2>&1; then
                SUCCESS=1
                break
              fi
              sleep 5
            done
            if [[ "$SUCCESS" -eq 1 ]]; then
              echo "✅ Ping succeeded — WireGuard tunnel is working"
            else
              echo "❌ Ping failed after 60s"
              docker logs wf-agent-a --tail=50
              docker logs wf-agent-b --tail=50
              exit 1
            fi
          else
            echo "❌ Could not determine Agent B WireGuard IP"
            docker logs wf-agent-b --tail=30
            exit 1
          fi

      # ════════════════════════════════════════════════════════════════════════
      # Step 6: Clean up resources
      # ════════════════════════════════════════════════════════════════════════

      - name: "[Step 6a] wireflow token delete"
        run: |
          echo ">>> wireflow token delete $TOKEN --signaling-url $SIGNALING_URL"
          $WIREFLOW token delete "$TOKEN" --signaling-url "$SIGNALING_URL"
          REMAINING=$($WIREFLOW token list -n "$NAMESPACE" --signaling-url "$SIGNALING_URL")
          echo "$REMAINING"
          echo "$REMAINING" | grep -q "^$TOKEN" \
            && { echo "❌ Token still present"; exit 1; } \
            || echo "✅ Token deleted"

      - name: "[Step 6b] wireflow policy remove"
        run: |
          echo ">>> wireflow policy remove my-policy -n $NAMESPACE --signaling-url $SIGNALING_URL"
          $WIREFLOW policy remove my-policy -n "$NAMESPACE" --signaling-url "$SIGNALING_URL"
          POLICIES=$($WIREFLOW policy list -n "$NAMESPACE" --signaling-url "$SIGNALING_URL")
          echo "$POLICIES"
          echo "$POLICIES" | grep -q "my-policy" \
            && { echo "❌ my-policy still present"; exit 1; } \
            || echo "✅ my-policy removed"

      - name: "[Step 6c] wireflow workspace remove"
        run: |
          echo ">>> wireflow workspace remove $NAMESPACE --signaling-url $SIGNALING_URL"
          $WIREFLOW workspace remove "$NAMESPACE" --signaling-url "$SIGNALING_URL"
          WORKSPACES=$($WIREFLOW workspace list --signaling-url "$SIGNALING_URL")
          echo "$WORKSPACES"
          echo "$WORKSPACES" | grep -q "$NAMESPACE" \
            && { echo "❌ Workspace still present"; exit 1; } \
            || echo "✅ Workspace removed"

      - name: "[Step 6d] Delete cluster and agent network"
        run: |
          docker rm -f wf-agent-a wf-agent-b 2>/dev/null || true
          docker network rm wf-test-net 2>/dev/null || true
          k3d cluster delete wireflow
          echo "✅ Cluster and agent network deleted"

      # ── Failure diagnostics ───────────────────────────────────────────────

      - name: Collect failure logs
        if: failure()
        run: |
          echo "===== wireflow-system pods ====="
          kubectl get all -n wireflow-system -o wide || true

          echo "===== wireflow-aio (wireflowd) logs ====="
          kubectl logs -n wireflow-system -l app.kubernetes.io/name=wireflowd --tail=300 2>&1 || true

          echo "===== workspace namespace ====="
          kubectl get all -n "${NAMESPACE:-unknown}" -o wide || true

          echo "===== WireflowPeer CRDs ====="
          kubectl get wfpeer --all-namespaces -o wide || true

          echo "===== Agent A docker logs ====="
          docker logs wf-agent-a --tail=100 2>/dev/null || true

          echo "===== Agent B docker logs ====="
          docker logs wf-agent-b --tail=100 2>/dev/null || true
